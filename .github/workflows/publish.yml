name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: Use bootstrap only for the first release; use staged thereafter.
        required: true
        default: staged
        type: choice
        options:
          - staged
          - bootstrap

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    env:
      NPM_CONFIG_PROVENANCE: "true"

    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository and complete history
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          base: ""
          head: HEAD
          version: "3.95.9"

      - name: Set up Node.js 24 and npm registry
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install exact dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Exercise stdio transport
        run: npm run smoke:stdio

      - name: Inspect dry-run package manifest
        run: npm pack --dry-run --json

      - name: Scan and smoke-test the real package tarball
        run: npm run pack:check

      - name: Confirm verification left the checkout clean
        run: git diff --exit-code

      - name: Bootstrap first release with short-lived token
        if: inputs.release_mode == 'bootstrap'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}

      - name: Submit a staged release with trusted publishing
        if: inputs.release_mode == 'staged'
        run: npm stage publish
