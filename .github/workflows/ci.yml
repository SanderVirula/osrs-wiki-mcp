name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node 24 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install exact dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Run process-heavy integration contracts serially
        run: node --test --test-concurrency=1 test/integration/release-artifact.test.ts

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Exercise stdio transport
        run: npm run smoke:stdio

      - name: Inspect dry-run package manifest
        run: npm pack --dry-run --json

      - name: Scan and smoke-test the real package tarball
        run: npm run pack:check

  secret-scan:
    name: Secret scan / full history
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out complete history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository and complete history
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          base: ""
          head: HEAD
          version: "3.95.9"

  node-current:
    name: Node current / advisory
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up current Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: current
          package-manager-cache: false

      - name: Install exact dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Verify forward compatibility
        run: npm run typecheck && npm test && npm run build && npm run smoke:stdio
